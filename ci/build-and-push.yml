# repo for GitHub Actions to pick it up. It ships under `ci/` because the token
# used for the initial automated push lacked the `workflow` scope. Relocate it
# via the GitHub web UI ("Add file" -> paste) or a push from a PAT that has both
# `repo` and `workflow` scopes. See docs/RUNBOOK.md, Step 3.
# =============================================================================
name: build-and-push

# Builds the linux/amd64 ZeroProof image (model baked in) and pushes it to the
# GitHub Container Registry (GHCR). After the first successful run, make the
# package PUBLIC (see RUNBOOK) so the grader can pull it anonymously.

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # -> ghcr.io/<owner>/zeroproof

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false      # single-arch manifest the grader can pull directly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### ZeroProof image pushed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Remember to make the GHCR package **public** before submitting." >> "$GITHUB_STEP_SUMMARY"
